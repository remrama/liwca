name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Pooch data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/liwca
            ~/Library/Caches/liwca
            ~\AppData\Local\liwca
          key: pooch-${{ runner.os }}-${{ hashFiles('src/liwca/data/registry.json') }}
          restore-keys: |
            pooch-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run tests with coverage
        run: pytest tests/ --cov=liwca --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

  version-bump:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version was bumped
        run: |
          CURRENT=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/liwca/__init__.py)
          PREVIOUS=$(git show HEAD~1:src/liwca/__init__.py | grep -oP '__version__\s*=\s*"\K[^"]+')
          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "::warning::Version was not bumped in this push. Remember to update __version__ in src/liwca/__init__.py before tagging a release (currently $CURRENT)."
          else
            echo "Version bumped: $PREVIOUS -> $CURRENT"
          fi

  test-remote:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run remote dictionary tests
        run: pytest tests/test_remote.py -v
